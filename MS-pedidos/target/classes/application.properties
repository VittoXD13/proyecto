# Nombre de la aplicaci’┐Įn (Como aparecer’┐Į en Eureka)
spring.application.name=MS-PEDIDOS
# Se recomienda un puerto distinto al de usuarios (ej. 9091) para evitar conflictos en local
server.port=9093

# Configuraci’┐Įn de Base de Datos
# Se cambia el nombre de la DB a db_pedidos
spring.datasource.url=jdbc:mysql://localhost:3306/db_pedidos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# 'validate' es perfecto si ya tienes tus scripts en Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialecto para MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuraci’┐Įn de Flyway
# Aseg’┐Įrate de poner el SQL que corregimos en: src/main/resources/db/migration/V1__create_table_pedido.sql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Registro en Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Logging
logging.level.root=INFO
# Ajustado al paquete de pedidos que pusiste en tu modelo
logging.level.com.example.MS_pedidos=DEBUG

# Habilita los endpoints de monitoreo
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always