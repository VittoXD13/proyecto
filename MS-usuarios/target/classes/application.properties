# Nombre de la aplicaciï¿½n (Como aparecerï¿½ en Eureka)
spring.application.name=MS-USUARIOS
server.port=9090

# Configuraciï¿½n de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Usamos 'update' solo si Flyway te da problemas, pero lo ideal es 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto actualizado para MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuraciï¿½n de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Registro en Eureka (Asegï¿½rate de que el MS-Eureka estï¿½ en el 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Logging para ver quï¿½ pasa con tus consultas
logging.level.root=INFO
logging.level.com.example.MS_usuarios=DEBUG

# Habilita los endpoints de monitoreo
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always