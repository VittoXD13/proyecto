# Servidor
server.port=9099

# Nombre (como aparece en Eureka)
spring.application.name=MS-SEGURIDAD

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_seguridad?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway ? apunta a db.migration (con punto, no slash, asi esta la carpeta)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db.migration

# JWT ? secret de exactamente 32 chars para HS256
jwt.secret=MarketExpressClaveJWT2024SecureX
jwt.expiration=86400000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Logging
logging.level.org.springframework.security=DEBUG