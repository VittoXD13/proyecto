spring.application.name=MS-DELIVERY
server.port=9098

spring.datasource.url=jdbc:mysql://localhost:3306/db_delivery?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

logging.level.org.springframework.web=INFO
logging.level.com.example.MS_productos=DEBUG

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always